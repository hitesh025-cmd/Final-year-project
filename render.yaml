services:
  - type: web
    name: blood-bank-system
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node backend/index.js
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DATABASE_URL
        fromDatabase:
          name: blood-bank-db
          property: connectionString

databases:
  - name: blood-bank-db
    plan: free
    databaseName: bloodbank
